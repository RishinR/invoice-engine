openapi: "3.1.0"
info:
  title: Invoice & Payment Service
  version: "1.0.0"
  description: Minimal invoice and payment service for Dodo Payments take-home assignment.

servers:
  - url: http://localhost:3000

security:
  - bearerAuth: []

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer

  schemas:
    Error:
      type: object
      properties:
        error:
          type: object
          properties:
            code:   { type: string }
            message: { type: string }

    Customer:
      type: object
      properties:
        id:          { type: string, format: uuid }
        business_id: { type: string, format: uuid }
        name:        { type: string }
        email:       { type: string }
        created_at:  { type: string, format: date-time }

    LineItem:
      type: object
      properties:
        id:                { type: string, format: uuid }
        invoice_id:        { type: string, format: uuid }
        description:       { type: string }
        quantity:          { type: integer }
        unit_amount_cents: { type: integer, description: "Positive integer cents" }
        amount_cents:      { type: integer }

    Invoice:
      type: object
      properties:
        id:          { type: string, format: uuid }
        business_id: { type: string, format: uuid }
        customer_id: { type: string, format: uuid }
        state:
          type: string
          enum: [draft, open, paid, void, uncollectible]
        total_cents: { type: integer, description: "Server-computed, integer cents" }
        due_date:    { type: string, format: date }
        created_at:  { type: string, format: date-time }
        updated_at:  { type: string, format: date-time }

    InvoiceResponse:
      allOf:
        - $ref: '#/components/schemas/Invoice'
        - type: object
          properties:
            line_items:
              type: array
              items: { $ref: '#/components/schemas/LineItem' }

    PaymentAttempt:
      type: object
      properties:
        id:              { type: string, format: uuid }
        invoice_id:      { type: string, format: uuid }
        idempotency_key: { type: string }
        card_token:      { type: string }
        status:
          type: string
          enum: [pending, succeeded, failed]
        psp_ref:      { type: string, nullable: true }
        failure_code: { type: string, nullable: true }
        created_at:   { type: string, format: date-time }
        updated_at:   { type: string, format: date-time }

paths:
  /customers:
    post:
      summary: Create a customer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, email]
              properties:
                name:  { type: string }
                email: { type: string }
      responses:
        "201": { description: Created, content: { application/json: { schema: { $ref: '#/components/schemas/Customer' } } } }
        "409": { description: Email already exists, content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } } }

    get:
      summary: List customers
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Customer' }

  /customers/{id}:
    get:
      summary: Get a customer by ID
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/Customer' } } } }
        "404": { description: Not found }

  /invoices:
    post:
      summary: Create an invoice with line items
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [customer_id, due_date, line_items]
              properties:
                customer_id: { type: string, format: uuid }
                due_date:    { type: string, format: date }
                line_items:
                  type: array
                  minItems: 1
                  items:
                    type: object
                    required: [description, quantity, unit_amount_cents]
                    properties:
                      description:       { type: string }
                      quantity:          { type: integer, minimum: 1 }
                      unit_amount_cents: { type: integer, minimum: 1 }
      responses:
        "201": { description: Created, content: { application/json: { schema: { $ref: '#/components/schemas/InvoiceResponse' } } } }

    get:
      summary: List invoices (filterable by state)
      parameters:
        - in: query
          name: state
          schema:
            type: string
            enum: [draft, open, paid, void, uncollectible]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Invoice' }

  /invoices/{id}:
    get:
      summary: Get invoice by ID (includes line items)
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/InvoiceResponse' } } } }
        "404": { description: Not found }

  /invoices/{id}/open:
    post:
      summary: Open a draft invoice
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200": { description: Invoice is now open }
        "422": { description: Invalid state transition }

  /invoices/{id}/void:
    post:
      summary: Void a draft or open invoice
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200": { description: Invoice is voided }
        "422": { description: Invalid state transition }

  /invoices/{id}/mark-uncollectible:
    post:
      summary: Mark an open invoice as uncollectible
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200": { description: Invoice is now uncollectible }
        "422": { description: Invalid state transition }

  /invoices/{id}/pay:
    post:
      summary: Attempt to pay an invoice
      description: |
        Idempotent via the required `Idempotency-Key` header.
        Reusing a key with the same body returns the cached attempt.
        Reusing a key with a different body returns 422.
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
        - in: header
          name: Idempotency-Key
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [card_token]
              properties:
                card_token:
                  type: string
                  description: |
                    tok_success, tok_insufficient_funds, tok_card_declined,
                    tok_timeout, tok_network_error
      responses:
        "200": { description: Payment succeeded, content: { application/json: { schema: { $ref: '#/components/schemas/PaymentAttempt' } } } }
        "402": { description: Payment failed (card issue or PSP error), content: { application/json: { schema: { $ref: '#/components/schemas/PaymentAttempt' } } } }
        "409": { description: Invoice already paid or active attempt exists }
        "422": { description: Invalid transition or idempotency key mismatch }

  /webhook-endpoints:
    post:
      summary: Register a webhook endpoint
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [url]
              properties:
                url: { type: string, format: uri }
      responses:
        "201":
          description: Created — signing_secret shown only once
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:             { type: string, format: uuid }
                  url:            { type: string }
                  active:         { type: boolean }
                  created_at:     { type: string, format: date-time }
                  signing_secret: { type: string, description: "Shown only at creation" }

    get:
      summary: List webhook endpoints (secret is not returned)
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:         { type: string, format: uuid }
                    url:        { type: string }
                    active:     { type: boolean }
                    created_at: { type: string, format: date-time }
